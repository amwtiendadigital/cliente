<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1D7A52">
<link rel="manifest" href="manifest.json">
<title>AmwDigital</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  color-scheme:light;
  --g:#1D7A52;--gl:#E8F5EF;--gd:#0F5438;
  --t:#111;--ts:#666;--th:#bbb;
  --bg:#F2F2F7;--card:#fff;--border:rgba(0,0,0,0.09);
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --nav:70px;--safe:env(safe-area-inset-bottom,0px);
  --r:14px;--rs:10px;
}
html,body{height:100%;overflow:hidden;background:#F2F2F7!important}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2F2F7!important;color:#111!important;display:flex;flex-direction:column}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe));background:var(--card);border-top:.5px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:90;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;background:none;border:none;cursor:pointer;color:var(--ts);font-size:12px;font-family:inherit;position:relative;transition:color .15s}
.nb.on{color:var(--g)}
.nb svg{width:26px;height:26px;stroke-width:1.8;fill:none;stroke:currentColor}
#cart-badge{display:none;position:absolute;top:2px;right:calc(50% - 20px);background:var(--g);color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;min-width:18px;text-align:center;font-weight:600}

/* ── APP ── */
#app{flex:1;overflow:hidden;position:relative;padding-bottom:calc(var(--nav) + var(--safe))}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:16px}
.view.on{display:block}

/* ── PAGE HEADER ── */
.vh{padding:14px 16px 10px;background:var(--card);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.vh h1{font-size:24px;font-weight:700;line-height:1}
.vh-row{display:flex;justify-content:space-between;align-items:center}
.link-btn{background:none;border:none;color:var(--g);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;padding:4px}

/* ── SEARCH ── */
.srch{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:0 10px;margin-top:10px}
.srch svg{opacity:.35;flex-shrink:0;width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
.srch input{flex:1;border:none;background:none;padding:11px 0;font-size:16px;color:var(--t);outline:none;font-family:inherit}
.srch input::placeholder{color:var(--ts)}

/* ── PILLS ── */
.pills{display:flex;gap:7px;overflow-x:auto;padding:10px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:14px;border:.5px solid var(--border);background:var(--card);color:var(--ts);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.pill.on{background:var(--g);color:#fff;border-color:var(--g)}

/* ── PRODUCT GRID ── */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
.pc{background:var(--card);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
.pc:active{transform:scale(.97)}
.pc-img-wrap{background:#f5f5f5;height:130px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.pc-img{width:100%;height:100%;object-fit:contain;padding:10px}
.pc-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px}
.pc-body{padding:10px 11px 11px;flex:1;display:flex;flex-direction:column;gap:3px}
.pc-name{font-size:14px;font-weight:500;line-height:1.35;flex:1}
.pc-pub{font-size:17px;color:var(--g);font-weight:700;margin-top:4px}
.pc-emp{font-size:13px;color:var(--ts)}
.pc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.pc-pts{font-size:11px;color:var(--g);background:var(--gl);padding:3px 8px;border-radius:6px;font-weight:500}
.pc-add{width:36px;height:36px;border-radius:10px;border:none;background:var(--g);color:#fff;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .12s}
.pc-add:active{transform:scale(.88)}

/* ── PRODUCT DETAIL MODAL ── */
#pdoverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#pdoverlay.on{display:flex}
#pdbox{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe))}
.pd-img-wrap{background:#f5f5f5;width:100%;aspect-ratio:1.4;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pd-img{width:100%;height:100%;object-fit:contain;padding:20px}
.pd-placeholder{font-size:80px;line-height:1}
.pd-info{padding:16px 18px}
.pd-sub{font-size:12px;color:var(--ts);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.pd-name{font-size:19px;font-weight:700;line-height:1.25;margin-bottom:10px}
.pd-desc{font-size:14px;color:var(--ts);line-height:1.55;margin-bottom:14px}
.pd-prices{background:var(--bg);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px}
.pd-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.pd-row+.pd-row{border-top:.5px solid var(--border)}
.pd-plabel{font-size:13px;color:var(--ts)}
.pd-pval{font-size:16px;font-weight:600}
.pd-pval.emp{color:var(--g)}
.pd-pval.pub{color:var(--t)}
.pd-pts{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--g);background:var(--gl);padding:4px 10px;border-radius:20px;margin-bottom:16px}
.pd-btns{display:flex;gap:10px}
.pd-btn-share{flex:1;background:var(--bg);border:.5px solid var(--border);color:var(--t);border-radius:var(--rs);padding:13px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.pd-btn-add{flex:2;background:var(--g);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500}
.pd-close{position:absolute;top:14px;right:16px;width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--ts)}
#pdbox{position:relative}

/* ── CALC ── */
.ptoggle{display:flex;gap:6px;padding:10px 12px}
.ptb{flex:1;padding:7px 4px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--card);color:var(--ts);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.ptb.on{background:var(--g);color:#fff;border-color:var(--g)}
.ci{background:var(--card);margin:0 12px 8px;border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.cin{flex:1;min-width:0}
.cin-name{font-size:13px;font-weight:500;line-height:1.3}
.cin-price{font-size:12px;color:var(--ts);margin-top:2px}
.qc{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qb{width:28px;height:28px;border-radius:8px;border:.5px solid var(--border);background:var(--bg);color:var(--t);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qn{min-width:22px;text-align:center;font-size:14px;font-weight:500}
.qd{width:28px;height:28px;border-radius:8px;border:none;background:none;color:#E24B4A;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qd svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
.empty{text-align:center;padding:60px 24px;color:var(--ts)}
.empty svg{opacity:.2;margin-bottom:12px}
.empty p{font-size:14px}

/* ── TOTALS BAR ── */
#tbar{position:fixed;bottom:calc(var(--nav) + var(--safe));left:0;right:0;background:var(--card)!important;border-top:.5px solid var(--border);padding:11px 16px 11px;display:none;z-index:85;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.tinfo{flex:1}
.tlabel{font-size:11px;color:var(--ts)}
.tamount{font-size:22px;font-weight:700;color:var(--g)}
.tbtns{display:flex;gap:8px}
.tshare{background:var(--bg);border:.5px solid var(--border);color:var(--t);border:none;border-radius:var(--rs);padding:10px 14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0}
.tpdf{background:var(--g);color:#fff;border:none;border-radius:var(--rs);padding:10px 14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0;display:flex;align-items:center;gap:5px}
#calc-view{display:flex;flex-direction:column;height:100%}
#calc-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px}

/* ── ORDERS ── */
.olist{padding:12px;display:flex;flex-direction:column;gap:10px}
.oc{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.och{padding:14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.ocn{font-size:15px;font-weight:600}
.ocm{font-size:12px;color:var(--ts);margin-top:2px}
.oct{font-size:17px;font-weight:700;color:var(--g)}
.oblist{border-top:.5px solid var(--border)}
.obr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--border)}
.obr:last-child{border-bottom:none}
.obn{font-size:14px;font-weight:500}
.obsub{font-size:11px;color:var(--ts);margin-top:1px}
.obt{font-size:15px;font-weight:700;color:var(--g)}
.oa{display:flex;gap:8px;padding:10px 14px;border-top:.5px solid var(--border)}
.btn-sm{flex:1;padding:8px;border-radius:8px;border:.5px solid var(--border);background:var(--bg);color:var(--t);cursor:pointer;font-size:13px;font-family:inherit}
.btn-del{background:none;border:none;color:#E24B4A;cursor:pointer;font-size:13px;padding:8px;font-family:inherit}
.fab{position:fixed;right:16px;bottom:calc(var(--nav) + var(--safe) + 16px);width:54px;height:54px;border-radius:16px;background:var(--g);color:#fff;border:none;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(29,122,82,.4);z-index:50;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* ── SETTINGS ── */
.stitle{font-size:12px;color:var(--ts);padding:18px 16px 6px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.ssec{background:var(--card);border-radius:var(--r);margin:0 12px;overflow:hidden;box-shadow:var(--shadow)}
.srow{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:.5px solid var(--border);cursor:pointer}
.srow:last-child{border-bottom:none}
.slabel{font-size:15px}
.sval{font-size:14px;color:var(--ts)}
.sval.red{color:#E24B4A}
.sval.grn{color:var(--g)}

/* ── MAIN MODAL ── */
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
#moverlay.on{display:flex}
#mbox{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px calc(24px + var(--safe))}
.mtitle{font-size:18px;font-weight:700;margin-bottom:3px}
.mstep{font-size:12px;color:var(--ts);margin-bottom:16px}
.flabel{font-size:13px;color:var(--ts);margin-bottom:5px;display:block;font-weight:500}
.finput{width:100%;border:.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:15px;background:var(--bg);color:var(--t);font-family:inherit;outline:none;margin-bottom:13px;transition:border-color .15s}
.finput:focus{border-color:var(--g)}
textarea.finput{resize:none;line-height:1.5}
.btnp{width:100%;background:var(--g);color:#fff;border:none;border-radius:var(--rs);padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.btns{width:100%;background:var(--bg);color:var(--t);border:.5px solid var(--border);border-radius:var(--rs);padding:12px;font-size:15px;cursor:pointer;font-family:inherit;margin-top:8px}
.btnp:active,.btns:active{opacity:.85}
.mscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.mscroll::-webkit-scrollbar{display:none}
.mpill{flex-shrink:0;padding:5px 11px;border-radius:16px;border:.5px solid var(--border);background:var(--card);color:var(--ts);cursor:pointer;font-size:12px;font-family:inherit}
.mpill.on{background:var(--g);color:#fff;border-color:var(--g)}
.apr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)}
.apr:last-child{border-bottom:none}
.apinfo{flex:1;min-width:0}
.apname{font-size:13px;font-weight:500;line-height:1.3}
.apprice{font-size:12px;color:var(--g);font-weight:500}
.apbtns{display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;max-width:140px;justify-content:flex-end}
.apb{padding:4px 9px;border-radius:7px;border:.5px solid var(--border);background:var(--bg);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:500}
.apb:active{background:var(--gl);color:var(--g)}
.asr{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:.5px solid var(--border)}
.asr:last-child{border-bottom:none}
.asinfo{flex:1;min-width:0;font-size:12px;line-height:1.4}
.asqc{display:flex;align-items:center;gap:3px;flex-shrink:0}
.asqb{width:24px;height:24px;border-radius:6px;border:.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.asqn{min-width:18px;text-align:center;font-size:13px;font-weight:500}
.asqd{border:none;background:none;color:#E24B4A;cursor:pointer;padding:4px;display:flex;align-items:center}
.asqd svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
.sum-card{background:var(--bg);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:.5px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-name{font-size:14px;font-weight:500}
.sum-sub{font-size:11px;color:var(--ts);margin-top:1px}
.sum-total{font-size:16px;font-weight:700;color:var(--g)}
.sum-grand{display:flex;justify-content:space-between;padding:0 4px;margin-bottom:20px;font-size:15px;font-weight:600}
.provb{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--card);cursor:pointer;font-size:14px;font-family:inherit;margin-bottom:7px;width:100%;color:var(--t)}
.provb:active{background:var(--gl)}
.prov-iibb{font-size:13px;color:var(--g);font-weight:600}

/* ── TOAST ── */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.92);color:#fff;padding:9px 20px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px)}
#toast.on{opacity:1}
.note{font-size:12px;color:var(--ts);padding:10px 16px}

/* ── PRINT / PRESUPUESTO ── */
#presupuesto-print{display:none}
@media print{
  body>*{display:none!important}
  #presupuesto-print{display:block!important;font-family:Arial,sans-serif;color:#000;padding:0;margin:0}
  .pp-header{background:#1D7A52;color:white;padding:20px 24px;display:flex;justify-content:space-between;align-items:flex-start}
  .pp-logo{font-size:28px;font-weight:900;letter-spacing:-1px}
  .pp-title{font-size:13px;opacity:.8;margin-top:2px}
  .pp-meta{text-align:right;font-size:13px;line-height:1.6}
  .pp-meta strong{font-size:15px}
  .pp-body{padding:24px}
  .pp-client{font-size:14px;margin-bottom:20px;padding:12px;background:#f5f5f5;border-radius:8px}
  .pp-client strong{font-size:16px;color:#1D7A52}
  table.pp-table{width:100%;border-collapse:collapse;margin-bottom:20px}
  table.pp-table th{background:#1D7A52;color:white;padding:9px 10px;text-align:left;font-size:12px;font-weight:600}
  table.pp-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #eee}
  table.pp-table tr:last-child td{border-bottom:none}
  table.pp-table tfoot td{border-top:2px solid #1D7A52;font-weight:700;font-size:14px;background:#f0f9f5;color:#1D7A52}
  .pp-footer{font-size:11px;color:#888;padding:12px;border-top:1px solid #eee;text-align:center}
}
#filein{display:none}

/* ── TOGGLE SWITCH ── */
.sw{width:44px;height:26px;border-radius:13px;background:var(--th);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;padding:0;display:inline-block}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on{background:var(--g)}
.sw.on::after{left:21px}

/* ── CLIENT BANNER ── */
#client-banner{background:var(--g);border-radius:8px;padding:6px 10px;margin:8px 0 0;font-size:12px;color:#fff;font-weight:600;text-align:center;display:none}
#client-banner.on{display:block}

/* ── COUNTRY / LANG GRID ── */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cgb{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rs);padding:12px 8px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;color:var(--t)}
.cgb.on,.cgb:active{background:var(--gl);border-color:var(--g);color:var(--g)}
.cgb-flag{font-size:24px;display:block;margin-bottom:3px}
.cgb-name{font-size:12px;font-weight:600;display:block}
.cgb-cur{font-size:11px;color:var(--ts);display:block}
.lang-opt{display:flex;align-items:center;gap:12px;padding:14px;border:.5px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;background:var(--bg);color:var(--t);margin-bottom:8px;width:100%;font-size:15px;font-weight:500;transition:all .15s}
.lang-opt.on,.lang-opt:active{background:var(--gl);border-color:var(--g);color:var(--g)}
.lang-flag{font-size:22px}

/* ── SYNC INPUT ── */
.sync-note{font-size:12px;color:var(--ts);padding:8px 0 10px;line-height:1.5}
</style>
</head>
<body>

<!-- PRESUPUESTO PRINT TEMPLATE -->
<div id="presupuesto-print"></div>

<!-- ══ APP ══ -->
<div id="app">

<!-- CATÁLOGO -->
<div id="v-catalogo" class="view on">
  <div class="vh">
    <div class="vh-row">
      <h1 id="h-catalogo">Catálogo</h1>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="eye-btn" onclick="toggleClientMode()" title="Modo Cliente"
          style="background:none;border:none;cursor:pointer;padding:4px;color:var(--ts);display:flex;align-items:center">
          <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <button onclick="showCountryModal()" id="country-label"
          style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--ts);font-family:inherit;padding:4px">🇦🇷 AR</button>

function loadGviz(sheetId, sheetName){
  return new Promise((resolve,reject)=>{
    const cb='_gv'+Date.now();
    const s=document.createElement('script');
    const t=setTimeout(()=>{s.remove();delete window[cb];reject(new Error('timeout'));},15000);
    window[cb]=(r)=>{clearTimeout(t);s.remove();delete window[cb];r.status==='ok'?resolve(r.table):reject(new Error(r.status||'err'));};
    s.onerror=()=>{clearTimeout(t);s.remove();delete window[cb];reject(new Error('net'));};
    s.src=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}`;
    document.head.appendChild(s);
  });
}

async function syncPrices(){
  toast(T('syncing'));
  try{
    const sheetName = COUNTRIES[country]?.sheet;
    if(!sheetName){toast(T('no_sync_url'));return;}
    const table=await loadGviz(AMWAY_SHEET_ID, sheetName);
    const cols=table.cols.map(c=>c.label.toLowerCase());
    const fi=pats=>cols.findIndex(c=>pats.some(p=>c.includes(p)));
    const nk=fi(['nombre','name','producto']);
    const ck=fi(['codigo','code','cod']);
    const catk=fi(['categ','cat']);
    const ek=fi(['empresario','emp','dist','costo']);
    const pk=fi(['pub','suger','retail','venta']);
    const ptk=fi(['punto','pts','point']);
    const gv=(r,k)=>k>=0?String(r.c[k]?.v??''):'';
    const num=v=>parseFloat(String(v).replace(/[$,"]/g,''))||0;
    const imp=table.rows.map((r,i)=>({
      id:gv(r,ck)||String(i),n:gv(r,nk)||'Sin nombre',
      cat:gv(r,catk)||'Importados',sub:'',
      cod:gv(r,ck)||'',desc:'',
      emp:num(gv(r,ek)),pub:num(gv(r,pk)),
      pts:num(gv(r,ptk))
    })).filter(p=>p.n&&p.emp>0);
    if(!imp.length){toast(T('sync_error')+' 0');return;}
    prods=imp;saveProds();
    localStorage.setItem('lastSync_'+country,new Date().toLocaleString(COUNTRIES[country].locale));
    toast(T('sync_ok'));
    initCats();renderProducts();
    if(document.getElementById('v-ajustes').classList.contains('on'))renderSettings();
  }catch(e){console.error(e);toast('ERR:'+String(e).substring(0,60));}
}

// CART
// ═══════════════════════════════════════════
function addCart(id){
  const ex=cart.find(i=>i.id===id);
  if(ex) ex.qty++;
  else cart.push({id,qty:1});
  saveCart(); updateBadge(); toast('Agregado ✓');
}

function updateBadge(){
  const total=cart.reduce((s,i)=>s+i.qty,0);
  const b=document.getElementById('cart-badge');
  b.textContent=total||''; b.style.display=total?'inline-block':'none';
}

function setPM(m){
  pm=m; ['emp','pub','both'].forEach(x=>document.getElementById('t-'+x).classList.toggle('on',x===m));
  renderCart();
}

function renderCart(){
  const el=document.getElementById('cart-list');
  const tb=document.getElementById('tbar');
  const ptoggle=document.querySelector('.ptoggle');
  // In client mode: hide distributor price toggle, force pub
  if(ptoggle)ptoggle.style.display=clientMode?'none':'flex';
  const effPm=clientMode?'pub':pm;
  if(!cart.length){
    el.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="11" y2="12"/><line x1="14" y1="12" x2="17" y2="12"/></svg>
      <p>${T('empty_cart')}</p></div>`;
    tb.style.display='none'; return;
  }
  tb.style.display='block';
  el.innerHTML=cart.map(item=>{
    const p=getP(item.id); if(!p) return '';
    let pr='';
    if(effPm==='emp') pr=`Emp: ${fmt(p.emp)} × ${item.qty} = <strong>${fmt(p.emp*item.qty)}</strong>`;
    else if(effPm==='pub') pr=`${T('pub_price')}: ${fmt(p.pub)} × ${item.qty} = <strong>${fmt(p.pub*item.qty)}</strong>`;
    else pr=`Emp: <strong>${fmt(p.emp*item.qty)}</strong> · Pub: ${fmt(p.pub*item.qty)}`;
    return `<div class="ci">
      <div class="cin">
        <div class="cin-name">${p.n}</div>
        <div class="cin-price">${pr}</div>
      </div>
      <div class="qc">
        <button class="qb" onclick="chQty('${item.id}',-1)">−</button>
        <span class="qn">${item.qty}</span>
        <button class="qb" onclick="chQty('${item.id}',1)">+</button>
        <button class="qd" onclick="remCart('${item.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>`;
  }).join('');
  const te=cart.reduce((s,i)=>{const p=getP(i.id);return s+(p?p.emp*i.qty:0);},0);
  const tp=cart.reduce((s,i)=>{const p=getP(i.id);return s+(p?p.pub*i.qty:0);},0);
  const pts=cart.reduce((s,i)=>{const p=getP(i.id);return s+(p?p.pts*i.qty:0);},0);
  const tl=document.getElementById('tlabel'), ta=document.getElementById('tamount');
  if(effPm==='emp'){tl.textContent=`${T('total_emp')} · ${pts.toFixed(1)} pts`;ta.textContent=fmt(te);}
  else if(effPm==='pub'){tl.textContent=`${T('total_pub')} · ${pts.toFixed(1)} pts`;ta.textContent=fmt(tp);}
  else{tl.textContent=`${pts.toFixed(1)} pts`;ta.textContent=`Emp ${fmt(te)}`;}
}

function chQty(id,d){
  const it=cart.find(i=>i.id===id); if(!it) return;
  it.qty+=d;
  if(it.qty<=0) remCart(id); else{saveCart();renderCart();updateBadge();}
}
function remCart(id){cart=cart.filter(i=>i.id!==id);saveCart();renderCart();updateBadge();}
function clearCart(){cart=[];saveCart();renderCart();updateBadge();}

function shareCart(){
  const lines=cart.map(it=>{
    const p=getP(it.id);if(!p)return '';
    return `• ${it.qty}× ${p.n}\n  Emp: ${fmt(p.emp*it.qty)} | Pub: ${fmt(p.pub*it.qty)}`;
  }).filter(Boolean);
  const te=cart.reduce((s,i)=>{const p=getP(i.id);return s+(p?p.emp*i.qty:0);},0);
  const tp=cart.reduce((s,i)=>{const p=getP(i.id);return s+(p?p.pub*i.qty:0);},0);
  const pts=cart.reduce((s,i)=>{const p=getP(i.id);return s+(p?p.pts*i.qty:0);},0);
  const txt=`*Lista Amway Argentina*\n\n${lines.join('\n')}\n\n─────────────────\nTotal empresario: *${fmt(te)}*\nTotal público: *${fmt(tp)}*\nPuntos: ${pts.toFixed(1)} pts`;
  if(navigator.share) navigator.share({text:txt}).catch(()=>{});
  else navigator.clipboard.writeText(txt).then(()=>toast('Copiado al portapapeles'));
}

// ORDERS
// ═══════════════════════════════════════════
function calcTotals(o){
  const ep=o.envio/Math.max(o.compradores.length,1);
  return o.compradores.map((n,i)=>{
    const prod=o.items.filter(it=>it.c===i).reduce((s,it)=>{const p=getP(it.id);return s+(p?p.emp*it.qty:0);},0);
    return{n,prod,total:prod+ep};
  });
}

function renderOrders(){
  const el=document.getElementById('orders-list');
  if(!ords.length){
    el.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <p>Tocá <strong>+</strong> para crear tu primer pedido grupal</p></div>`;
    return;
  }
  el.innerHTML=ords.map(o=>{
    const tots=calcTotals(o);
    const grand=tots.reduce((s,b)=>s+b.total,0);
    const ep=o.envio/Math.max(o.compradores.length,1);
    return`<div class="oc">
      <div class="och" onclick="toggleOrd('${o.id}')">
        <div>
          <div class="ocn">${o.nombre}</div>
          <div class="ocm">${o.compradores.length} compradores · ${o.fecha}</div>
        </div>
        <div class="oct">${fmt(grand)}</div>
      </div>
      <div class="oblist" id="ob-${o.id}" style="display:none">
        ${tots.map((b,i)=>`
          <div class="obr">
            <div>
              <div class="obn">${b.n}</div>
              <div class="obsub">Productos ${fmt(b.prod)} + Envío ${fmt(ep)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="obt">${fmt(b.total)}</div>
              <button style="background:var(--gl);border:none;border-radius:8px;padding:5px 10px;color:var(--g);cursor:pointer;font-size:12px;font-family:inherit;font-weight:500" onclick="shareBuyer('${o.id}',${i})">Enviar</button>
            </div>
          </div>`).join('')}
        <div class="oa">
          <button class="btn-sm" onclick="editOrd('${o.id}')">Editar</button>
          <button class="btn-del" onclick="delOrd('${o.id}')">Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleOrd(id){const el=document.getElementById('ob-'+id);el.style.display=el.style.display==='none'?'block':'none';}

function shareBuyer(oid,bi){
  const o=ords.find(x=>x.id===oid);if(!o)return;
  const ep=o.envio/Math.max(o.compradores.length,1);
  const name=o.compradores[bi];
  const items=o.items.filter(it=>it.c===bi);
  const lines=items.map(it=>{const p=getP(it.id);return p?`• ${it.qty}× ${p.n}: ${fmt(p.emp*it.qty)}`:''}).filter(Boolean);
  const sub=items.reduce((s,it)=>{const p=getP(it.id);return s+(p?p.emp*it.qty:0);},0);
  const txt=`Hola ${name.split(' ')[0]}! 🌿 Tu pedido:\n\n${lines.join('\n')}\nEnvío: ${fmt(ep)}\n────────────\n*Total: ${fmt(sub+ep)}*\n\n¡Gracias!`;
  if(navigator.share) navigator.share({text:txt}).catch(()=>{});
  else navigator.clipboard.writeText(txt).then(()=>toast('Copiado'));
}

function delOrd(id){if(!confirm('¿Eliminar este pedido?'))return;ords=ords.filter(o=>o.id!==id);saveOrds();renderOrders();}

function editOrd(id){
  const o=ords.find(x=>x.id===id);if(!o)return;
  ords=ords.filter(x=>x.id!==id);
  nos={step:1,nombre:o.nombre,compradores:[...o.compradores],envio:o.envio,items:[...o.items],editId:id};
  openModal();renderStep1();
}

// ═══════════════════════════════════════════
// NEW ORDER WIZARD
// ═══════════════════════════════════════════
function newOrder(){nos={step:1,nombre:'',compradores:[],envio:0,items:[],editId:null};openModal();renderStep1();}

function renderStep1(){
  document.getElementById('mbox').innerHTML=`
    <div class="mtitle">Pedido grupal</div>
    <div class="mstep">Paso 1 de 3 — Datos generales</div>
    <label class="flabel">Nombre del pedido</label>
    <input class="finput" id="m-nom" placeholder="Pedido junio 2026" value="${nos.nombre}">
    <label class="flabel">Compradores (uno por línea)</label>
    <textarea class="finput" id="m-comp" rows="4" placeholder="Ale Seijo&#10;Darío&#10;Fer Ghedín">${nos.compradores.join('\n')}</textarea>
    <label class="flabel">Costo total de envío ($)</label>
    <input class="finput" id="m-env" type="number" placeholder="38173" value="${nos.envio||''}">
    <button class="btnp" onclick="step2()">Siguiente — Asignar productos →</button>
    <button class="btns" onclick="closeModal()">Cancelar</button>`;
}

function step2(){
  const nom=document.getElementById('m-nom').value.trim();
  const comp=document.getElementById('m-comp').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const env=parseFloat(document.getElementById('m-env').value)||0;
  if(!nom||!comp.length){toast('Completá nombre y compradores');return;}
  nos.nombre=nom;nos.compradores=comp;nos.envio=env;
  window._mcat='Todos';renderStep2();
}

function renderStep2(){
  const cats=['Todos',...new Set(prods.map(p=>p.cat))];
  document.getElementById('mbox').innerHTML=`
    <div class="mtitle">Asignar productos</div>
    <div class="mstep">Paso 2 de 3 — ¿Qué pidió cada uno?</div>
    <input class="finput" id="m-srch" placeholder="Buscar..." oninput="renderAssignProds()" style="margin-bottom:8px">
    <div class="mscroll" id="m-cats">
      ${cats.map(c=>`<button class="mpill${c==='Todos'?' on':''}" onclick="mcat('${c}',this)">${c}</button>`).join('')}
    </div>
    <div id="m-prods" style="max-height:30vh;overflow-y:auto;margin:8px 0;border-top:.5px solid var(--border);padding-top:8px"></div>
    <div style="font-size:13px;font-weight:600;margin-bottom:6px;padding-top:8px;border-top:.5px solid var(--border)">Asignados</div>
    <div id="m-assigned" style="max-height:20vh;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btns" style="margin:0;flex:1" onclick="renderStep1()">← Atrás</button>
      <button class="btnp" style="flex:2;margin:0" onclick="step3()">Ver resumen →</button>
    </div>`;
  renderAssignProds();renderAssigned();
}

function mcat(cat,btn){window._mcat=cat;document.querySelectorAll('#m-cats .mpill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderAssignProds();}

function renderAssignProds(){
  const q=(document.getElementById('m-srch')?.value||'').toLowerCase();
  const cat=window._mcat||'Todos';
  const list=prods.filter(p=>{return(cat==='Todos'||p.cat===cat)&&(!q||p.n.toLowerCase().includes(q)||p.cod.toLowerCase().includes(q));}).slice(0,20);
  const el=document.getElementById('m-prods');if(!el)return;
  el.innerHTML=list.map(p=>`
    <div class="apr">
      <div class="apinfo"><div class="apname">${p.n}</div><div class="apprice">${fmt(p.emp)}</div></div>
      <div class="apbtns">${nos.compradores.map((c,i)=>`<button class="apb" onclick="assign('${p.id}',${i})">${c.split(' ')[0]}</button>`).join('')}</div>
    </div>`).join('');
}

function assign(pid,ci){
  const ex=nos.items.find(it=>it.id===pid&&it.c===ci);
  if(ex) ex.qty++;
  else nos.items.push({id:pid,c:ci,qty:1});
  renderAssigned();toast('✓ '+nos.compradores[ci].split(' ')[0]);
}

function renderAssigned(){
  const el=document.getElementById('m-assigned');if(!el)return;
  if(!nos.items.length){el.innerHTML='<div style="font-size:13px;color:var(--ts);padding:6px 0">Sin productos asignados aún.</div>';return;}
  el.innerHTML=nos.items.map((it,idx)=>{
    const p=getP(it.id);const cn=nos.compradores[it.c]||'?';
    return`<div class="asr">
      <div class="asinfo"><strong>${cn.split(' ')[0]}</strong> · ${it.qty}× ${p?p.n:'?'}<br><span style="color:var(--g)">${p?fmt(p.emp*it.qty):''}</span></div>
      <div class="asqc">
        <button class="asqb" onclick="asQty(${idx},-1)">−</button>
        <span class="asqn">${it.qty}</span>
        <button class="asqb" onclick="asQty(${idx},1)">+</button>
        <button class="asqd" onclick="asRem(${idx})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>`;
  }).join('');
}

function asQty(idx,d){nos.items[idx].qty+=d;if(nos.items[idx].qty<=0)nos.items.splice(idx,1);renderAssigned();}
function asRem(idx){nos.items.splice(idx,1);renderAssigned();}

function step3(){
  const tots=calcTotals(nos);
  const ep=nos.envio/Math.max(nos.compradores.length,1);
  const grand=tots.reduce((s,b)=>s+b.total,0);
  document.getElementById('mbox').innerHTML=`
    <div class="mtitle">Resumen del pedido</div>
    <div class="mstep">Paso 3 de 3 — Confirmá para guardar</div>
    <div class="sum-card">
      ${tots.map(b=>`
        <div class="sum-row">
          <div><div class="sum-name">${b.n}</div><div class="sum-sub">Productos ${fmt(b.prod)} + Envío ${fmt(ep)}</div></div>
          <div class="sum-total">${fmt(b.total)}</div>
        </div>`).join('')}
    </div>
    <div class="sum-grand"><span style="color:var(--ts)">Total general</span><span>${fmt(grand)}</span></div>
    <button class="btnp" onclick="saveOrd()">Guardar pedido</button>
    <button class="btns" onclick="renderStep2()">← Editar productos</button>`;
}

function saveOrd(){
  const ord={id:nos.editId||uid(),nombre:nos.nombre,compradores:nos.compradores,envio:nos.envio,items:nos.items,fecha:new Date().toLocaleDateString('es-AR')};
  ords.unshift(ord);saveOrds();closeModal();goTo('pedidos');toast('Pedido guardado ✓');
}

function showProvModal(){
  document.getElementById('mbox').innerHTML=`
    <div class="mtitle" style="margin-bottom:14px">Seleccionar provincia</div>
    ${PROVINCIAS.map(p=>`
      <button class="provb" onclick="setProv('${p.n}',${p.iibb})">
        <span>${p.n}</span><span class="prov-iibb">${p.iibb}% IIBB</span>
      </button>`).join('')}
    <button class="btns" onclick="closeModal()">Cancelar</button>`;
  openModal();
}

function setProv(n,iibb){
  prov={n,iibb};saveProv();
  document.getElementById('prov-label').textContent=`${n} (${iibb}%)`;
  closeModal();toast(n+' seleccionada');
}

// ═══════════════════════════════════════════
// IMPORT
// ═══════════════════════════════════════════
function importFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      if(!rows.length){toast('Archivo vacío');return;}
      const keys=Object.keys(rows[0]).map(k=>k.toLowerCase());
      const fk=pats=>keys.find(k=>pats.some(p=>k.includes(p)));
      const nk=fk(['nombre','name','producto']);
      const ck=fk(['codigo','code','cod']);
      const catk=fk(['categ','cat']);
      const ek=fk(['empresario','emp','costo']);
      const pk=fk(['pub','sugerido','venta']);
      const ptk=fk(['punto','pts','point']);
      if(!nk||!ek){toast('Columnas no reconocidas');return;}
      const gv=(row,key)=>key?Object.entries(row).find(([k])=>k.toLowerCase()===key)?.[1]??null:null;
      const parse=v=>parseFloat(String(v||0).replace(/[$,"]/g,''))||0;
      const imp=rows.map((row,i)=>({
        id:gv(row,ck)||String(i),n:String(gv(row,nk)||'Sin nombre'),
        cat:String(gv(row,catk)||'Importados'),sub:'',
        cod:String(gv(row,ck)||''),desc:'',
        emp:parse(gv(row,ek)),pub:parse(gv(row,pk)),
        pts:parseFloat(gv(row,ptk)||0)||0
      })).filter(p=>p.n&&p.emp>0);
      if(!imp.length){toast('Sin productos válidos');return;}
      prods=imp;saveProds();
      toast(`${imp.length} productos importados ✓`);
      initCats();renderProducts();
      if(document.getElementById('v-ajustes').classList.contains('on'))renderSettings();
    }catch(err){toast('Error al leer el archivo');console.error(err);}
  };
  r.readAsArrayBuffer(file);
  e.target.value='';
}

function resetProds(){
  if(!confirm(T('restore')+' ('+COUNTRIES[country].name+')?'))return;
  prods=country==='AR'?DEFAULT_PRODS:[];
  saveProds();toast('Precios restaurados ✓');
  initCats();renderProducts();
  renderSettings();
}

// CLIENT LINK GENERATOR
// ═══════════════════════════════════════════
const CLIENT_APP_URL = 'https://amwtiendadigital.github.io/cliente';

function showClientLinkModal(){
  const savedTel = localStorage.getItem('clientWaTel') || '';
  const savedNom = localStorage.getItem('clientNombre') || '';
  const existingLink = savedTel
    ? CLIENT_APP_URL + '/#tel=' + savedTel + '&nombre=' + encodeURIComponent(savedNom||'Mi Tienda AmwDigital') + '&pais=' + country
    : '';
  document.getElementById('mbox').innerHTML=`
    <div class="mtitle">🔗 Link para clientes</div>
    <div class="mstep">Completá los datos y copiá el link para compartir tu tienda.</div>

    <label class="flabel">Tu número de WhatsApp (con código de país)</label>
    <input class="finput" id="cl-tel" placeholder="ej. 5491112345678" value="${savedTel}" type="tel">

    <label class="flabel">Nombre de tu tienda</label>
    <input class="finput" id="cl-nom" placeholder="ej. AmwDigital con María" value="${savedNom}">

    <button class="btnp" onclick="generateClientLink()">Generar link</button>

    <div id="cl-result" style="display:${existingLink?'block':'none'};margin-top:14px">
      <div style="background:var(--bg);border-radius:var(--rs);padding:12px;font-size:12px;word-break:break-all;color:var(--ts);font-family:monospace;line-height:1.6" id="cl-link-text">${existingLink}</div>
      <button class="btnp" style="margin-top:10px" onclick="copyClientLink()">📋 Copiar y compartir link</button>
    </div>

    <button class="btns" onclick="closeModal()">Cerrar</button>`;
  openModal();
}

function generateClientLink(){
  const tel = document.getElementById('cl-tel').value.trim().replace(/\D/g,'');
  const nom = document.getElementById('cl-nom').value.trim() || 'Mi Tienda AmwDigital';
  if(!tel){ alert('Ingresá tu número de WhatsApp'); return; }
  localStorage.setItem('clientWaTel', tel);
  localStorage.setItem('clientNombre', nom);
  const link = CLIENT_APP_URL + '/#tel=' + tel + '&nombre=' + encodeURIComponent(nom) + '&pais=' + country;
  document.getElementById('cl-link-text').textContent = link;
  document.getElementById('cl-result').style.display = 'block';
}

function copyClientLink(){
  const link = document.getElementById('cl-link-text').textContent;
  if(navigator.share){
    navigator.share({title:'Mi Tienda AmwDigital — App de Clientes', url:link}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(link).then(()=>toast('Link copiado ✓')).catch(()=>{});
  }
}

// PWA INSTALL
// ═══════════════════════════════════════════
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Refresh settings if open so the install button appears
  if(document.getElementById('v-ajustes').classList.contains('on')) renderSettings();
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  toast('¡App instalada! ✓');
  if(document.getElementById('v-ajustes').classList.contains('on')) renderSettings();
});

async function installApp(){
  if(deferredInstallPrompt){
    // Chrome Android: trigger native install dialog
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    if(outcome === 'accepted'){ deferredInstallPrompt = null; toast('¡App instalada! ✓'); }
    renderSettings();
    return;
  }
  // Fallback: show step-by-step instructions
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid = /android/i.test(navigator.userAgent);
  let steps = '';
  if(isIOS){
    steps = `
      <div style="display:flex;flex-direction:column;gap:12px;margin:16px 0">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">1</div>
          <div style="font-size:14px">Tocá el botón <strong>Compartir</strong> <span style="font-size:18px">⎋</span> en la barra inferior de Safari</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff">2</div>
          <div style="font-size:14px">Deslizá hacia abajo y tocá <strong>"Agregar a pantalla de inicio"</strong></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff">3</div>
          <div style="font-size:14px">Tocá <strong>"Agregar"</strong> arriba a la derecha</div>
        </div>
      </div>
      <div style="background:var(--bg);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:var(--ts)">⚠️ Debe abrirse en <strong>Safari</strong> — Chrome en iPhone no soporta instalación PWA</div>`;
  } else if(isAndroid){
    steps = `
      <div style="display:flex;flex-direction:column;gap:12px;margin:16px 0">

        </div>
        <div style="display:flex;align-items:center;gap:12px">

          <div style="font-size:14px">Tocá <strong>"Agregar a pantalla de inicio"</strong> o <strong>"Instalar app"</strong></div>

  document.getElementById('mbox').innerHTML=`

// Auto-sync al abrir: si el país tiene sheet configurado y pasó más de 1 hora
(function autoSync(){
  if(!COUNTRIES[country]?.sheet) return;
  const lastRaw = localStorage.getItem('lastSyncTs_' + country);
  const elapsed = lastRaw ? Date.now() - parseInt(lastRaw) : Infinity;
  if(elapsed > 60 * 60 * 1000) {
    syncPrices().then(()=> localStorage.setItem('lastSyncTs_' + country, Date.now()));
  }
})();
</script>
